name: API Tests

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/api/**'
  pull_request:
    paths:
      - 'supabase/functions/api/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run API tests
        working-directory: supabase/functions/api
        run: deno task test
