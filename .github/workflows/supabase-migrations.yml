name: Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy edge functions
        run: |
          LOCAL_FNS=$(ls -d supabase/functions/*/ 2>/dev/null | xargs -I{} basename {} | sort)
          REMOTE_FNS=$(supabase functions list --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} | tail -n +4 | awk '{print $2}' | grep -v '^-' | grep -v '^$' | sort)

          # Deploy all local functions. Kong (the platform gateway) verifies JWTs
          # for the `api` function. Webhook responders (`notify-*`, `delete-profile-photo`)
          # opt out of verification via `verify_jwt = false` in supabase/config.toml.
          if [ -n "$LOCAL_FNS" ]; then
            echo "$LOCAL_FNS" | while read fn; do
              supabase functions deploy "$fn"
            done
          fi

          # Delete remote functions that no longer exist locally
          for fn in $REMOTE_FNS; do
            if ! echo "$LOCAL_FNS" | grep -qx -- "$fn"; then
              echo "Deleting removed function: $fn"
              supabase functions delete "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
